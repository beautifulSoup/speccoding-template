<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth Demo</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-hover: #334155;
      --border: rgba(148, 163, 184, 0.12);
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --success: #22c55e;
      --error: #ef4444;
      --error-bg: rgba(239, 68, 68, 0.1);
      --success-bg: rgba(34, 197, 94, 0.1);
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 1.5rem;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .card-header {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .card-header .icon {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .card-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .card-header p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* Form */
    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 0.4rem;
      color: var(--text-muted);
    }

    .form-group input {
      width: 100%;
      padding: 0.7rem 0.9rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      transition: border-color 0.2s;
      outline: none;
    }

    .form-group input:focus {
      border-color: var(--primary);
    }

    .form-group input::placeholder {
      color: #475569;
    }

    /* Button */
    .btn {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--primary-hover);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.15);
      color: var(--error);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.25);
    }

    /* Message */
    .message {
      padding: 0.65rem 0.9rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
      animation: fadeIn 0.2s ease;
    }

    .message.error {
      display: block;
      background: var(--error-bg);
      color: var(--error);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .message.success {
      display: block;
      background: var(--success-bg);
      color: var(--success);
      border: 1px solid rgba(34, 197, 94, 0.2);
    }

    /* Toggle link */
    .toggle {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .toggle a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
    }

    .toggle a:hover {
      text-decoration: underline;
    }

    /* Profile view */
    .profile-info {
      text-align: center;
      padding: 1rem 0;
    }

    .profile-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 1rem;
    }

    .profile-email {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .profile-id {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }

    .profile-meta {
      background: var(--bg);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1.25rem;
    }

    .profile-meta-row {
      display: flex;
      justify-content: space-between;
      padding: 0.4rem 0;
      font-size: 0.85rem;
    }

    .profile-meta-row:not(:last-child) {
      border-bottom: 1px solid var(--border);
    }

    .profile-meta-label {
      color: var(--text-muted);
    }

    .profile-meta-value {
      font-weight: 500;
      font-family: 'SF Mono', Consolas, monospace;
      font-size: 0.8rem;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .container { padding: 1rem; }
      .card { padding: 1.5rem; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- ========== Login View ========== -->
  <div id="view-login" class="card">
    <div class="card-header">
      <div class="icon">🔐</div>
      <h1>欢迎回来</h1>
      <p>登录你的账户</p>
    </div>
    <div id="login-msg" class="message"></div>
    <form id="login-form">
      <div class="form-group">
        <label for="login-email">邮箱地址</label>
        <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="login-password">密码</label>
        <input type="password" id="login-password" placeholder="输入密码" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" id="login-btn">登 录</button>
    </form>
    <div class="toggle">还没有账户？<a onclick="showView('register')">立即注册</a></div>
  </div>

  <!-- ========== Register View ========== -->
  <div id="view-register" class="card" style="display:none;">
    <div class="card-header">
      <div class="icon">✨</div>
      <h1>创建账户</h1>
      <p>注册一个新账户开始使用</p>
    </div>
    <div id="register-msg" class="message"></div>
    <form id="register-form">
      <div class="form-group">
        <label for="reg-email">邮箱地址</label>
        <input type="email" id="reg-email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="reg-password">密码</label>
        <input type="password" id="reg-password" placeholder="至少8位，含大小写字母和数字" required autocomplete="new-password" minlength="8">
      </div>
      <div class="form-group">
        <label for="reg-password2">确认密码</label>
        <input type="password" id="reg-password2" placeholder="再次输入密码" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary" id="register-btn">注 册</button>
    </form>
    <div class="toggle">已有账户？<a onclick="showView('login')">返回登录</a></div>
  </div>

  <!-- ========== Profile View ========== -->
  <div id="view-profile" class="card" style="display:none;">
    <div class="card-header">
      <div class="icon">👤</div>
      <h1>个人中心</h1>
      <p><span class="status-dot"></span>已认证登录</p>
    </div>
    <div class="profile-info">
      <div class="profile-avatar">👤</div>
      <div class="profile-email" id="profile-email">-</div>
      <div class="profile-id" id="profile-id">ID: -</div>
    </div>
    <div class="profile-meta">
      <div class="profile-meta-row">
        <span class="profile-meta-label">Access Token</span>
        <span class="profile-meta-value" id="token-preview">-</span>
      </div>
      <div class="profile-meta-row">
        <span class="profile-meta-label">Token 过期</span>
        <span class="profile-meta-value" id="token-expires">-</span>
      </div>
      <div class="profile-meta-row">
        <span class="profile-meta-label">自动刷新</span>
        <span class="profile-meta-value" style="color: var(--success);">✓ 已启用</span>
      </div>
    </div>
    <button class="btn btn-danger" onclick="logout()">退出登录</button>
  </div>

</div>

<script>
  // ========================
  //  Configuration
  // ========================
  const API_BASE = window.location.origin; // same origin when deployed together, or change to backend URL

  // ========================
  //  State
  // ========================
  let accessToken = null;
  let refreshTimer = null;

  // ========================
  //  View Management
  // ========================
  function showView(name) {
    document.getElementById('view-login').style.display = 'none';
    document.getElementById('view-register').style.display = 'none';
    document.getElementById('view-profile').style.display = 'none';
    document.getElementById('view-' + name).style.display = 'block';
    // Clear messages
    clearMsg('login-msg');
    clearMsg('register-msg');
  }

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'message ' + type;
  }

  function clearMsg(id) {
    const el = document.getElementById(id);
    el.className = 'message';
    el.textContent = '';
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    if (loading) {
      btn.disabled = true;
      btn.dataset.originalText = btn.textContent;
      btn.innerHTML = '<span class="spinner"></span>请稍候...';
    } else {
      btn.disabled = false;
      btn.textContent = btn.dataset.originalText || btn.textContent;
    }
  }

  // ========================
  //  API Helpers
  // ========================
  async function apiPost(path, body) {
    const headers = { 'Content-Type': 'application/json' };
    if (accessToken) headers['Authorization'] = 'Bearer ' + accessToken;
    const res = await fetch(API_BASE + path, {
      method: 'POST',
      headers,
      body: JSON.stringify(body),
      credentials: 'include', // send cookies for refresh_token
    });
    const data = await res.json();
    if (!res.ok) throw { status: res.status, data };
    return data;
  }

  async function apiGet(path) {
    const headers = {};
    if (accessToken) headers['Authorization'] = 'Bearer ' + accessToken;
    const res = await fetch(API_BASE + path, {
      headers,
      credentials: 'include',
    });
    const data = await res.json();
    if (!res.ok) throw { status: res.status, data };
    return data;
  }

  function getErrorMessage(err) {
    if (err.data && err.data.error) {
      const e = err.data.error;
      const messages = {
        'email_already_exists': '该邮箱已被注册',
        'invalid_credentials': '邮箱或密码错误',
        'validation_error': e.message || '输入格式不正确',
        'rate_limit_exceeded': '请求过于频繁，请稍后再试',
        'token_expired': '登录已过期，请重新登录',
        'invalid_token': 'Token 无效，请重新登录',
      };
      return messages[e.code] || e.message || '操作失败';
    }
    return '网络错误，请检查连接';
  }

  // ========================
  //  Token Management
  // ========================
  function parseJwt(token) {
    try {
      const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
      return JSON.parse(atob(base64));
    } catch {
      return null;
    }
  }

  function scheduleRefresh() {
    if (refreshTimer) clearTimeout(refreshTimer);
    if (!accessToken) return;

    const payload = parseJwt(accessToken);
    if (!payload || !payload.exp) return;

    // Refresh 2 minutes before expiry
    const expiresIn = payload.exp * 1000 - Date.now();
    const refreshIn = Math.max(expiresIn - 2 * 60 * 1000, 5000);

    refreshTimer = setTimeout(async () => {
      try {
        const data = await apiPost('/api/auth/refresh', {});
        accessToken = data.access_token;
        updateTokenDisplay();
        scheduleRefresh();
      } catch {
        // Refresh failed, log out
        logout();
      }
    }, refreshIn);
  }

  function updateTokenDisplay() {
    if (!accessToken) return;
    const payload = parseJwt(accessToken);
    document.getElementById('token-preview').textContent =
      accessToken.substring(0, 12) + '...' + accessToken.slice(-8);
    if (payload && payload.exp) {
      const d = new Date(payload.exp * 1000);
      document.getElementById('token-expires').textContent =
        d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
  }

  // ========================
  //  Auth Actions
  // ========================

  // Register
  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearMsg('register-msg');

    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const password2 = document.getElementById('reg-password2').value;

    if (password !== password2) {
      showMsg('register-msg', '两次输入的密码不一致', 'error');
      return;
    }

    setLoading('register-btn', true);
    try {
      await apiPost('/api/auth/register', { email, password });
      showMsg('register-msg', '🎉 注册成功！正在跳转到登录...', 'success');
      setTimeout(() => {
        showView('login');
        document.getElementById('login-email').value = email;
        showMsg('login-msg', '注册成功，请登录', 'success');
      }, 1000);
    } catch (err) {
      showMsg('register-msg', getErrorMessage(err), 'error');
    } finally {
      setLoading('register-btn', false);
    }
  });

  // Login
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearMsg('login-msg');

    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    setLoading('login-btn', true);
    try {
      const data = await apiPost('/api/auth/login', { email, password });
      accessToken = data.access_token;

      // Fetch user profile
      const profile = await apiGet('/api/me');
      document.getElementById('profile-email').textContent = profile.user.email;
      document.getElementById('profile-id').textContent = 'User ID: ' + profile.user.id;
      updateTokenDisplay();
      scheduleRefresh();
      showView('profile');
    } catch (err) {
      showMsg('login-msg', getErrorMessage(err), 'error');
    } finally {
      setLoading('login-btn', false);
    }
  });

  // Logout
  function logout() {
    accessToken = null;
    if (refreshTimer) clearTimeout(refreshTimer);
    refreshTimer = null;
    document.getElementById('login-form').reset();
    document.getElementById('register-form').reset();
    showView('login');
  }
</script>

</body>
</html>
